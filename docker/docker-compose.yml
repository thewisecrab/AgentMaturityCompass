version: "3.9"

services:
  amc-studio:
    image: ghcr.io/thewisecrab/amc-studio:latest
    container_name: amc-studio
    restart: unless-stopped
    ports:
      - "3210:3210"   # Gateway proxy
      - "3211:3211"   # Transparent proxy
      - "3212:3212"   # Studio API
      - "3213:3213"   # Toolhub
      - "4173:4173"   # Dashboard UI
    volumes:
      - amc-data:/data/amc
    environment:
      - NODE_ENV=production
      - AMC_BIND=0.0.0.0
    healthcheck:
      test: ["CMD", "node", "dist/cli.js", "studio", "healthcheck", "--workspace", "/data/amc"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m

volumes:
  amc-data:
    driver: local

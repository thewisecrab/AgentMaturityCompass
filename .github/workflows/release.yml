name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Prepack release guardrails
        run: npm run release:prepack-check

      - name: Validate tag version matches package.json
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -e 'const pkg=require("./package.json");process.stdout.write(pkg.version)')
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG) does not match package.json ($PKG_VERSION)"
            exit 1
          fi

      - name: Build and push Docker image to GHCR
        id: docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/amc-studio:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/amc-studio:latest

      - name: Build release bundle and verify
        env:
          AMC_RELEASE_SIGNING_KEY: ${{ secrets.AMC_RELEASE_SIGNING_KEY }}
          AMC_DOCKER_IMAGE: ghcr.io/${{ github.repository_owner }}/amc-studio:${{ github.ref_name }}
          AMC_DOCKER_DIGEST: ${{ steps.docker.outputs.digest }}
          AMC_DOCKER_PLATFORMS: linux/amd64
        run: |
          mkdir -p dist
          VERSION=$(node -e 'const pkg=require("./package.json");process.stdout.write(pkg.version)')
          node dist/cli.js release pack --out "dist/amc-${VERSION}.amcrelease"
          node dist/cli.js release verify "dist/amc-${VERSION}.amcrelease" | tee "dist/release-verify.txt"
          tar -xzf "dist/amc-${VERSION}.amcrelease" -C dist
          cp dist/amc-release/artifacts/sbom/sbom.cdx.json "dist/sbom.cdx.json"
          cp dist/amc-release/artifacts/licenses/licenses.json "dist/licenses.json"
          cp dist/amc-release/artifacts/provenance/provenance.json "dist/provenance.json"

      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if ! npm publish --provenance; then
            npm publish
          fi

      - name: Build release notes
        run: |
          VERSION=$(node -e 'const pkg=require("./package.json");process.stdout.write(pkg.version)')
          {
            echo "# AMC ${VERSION}"
            echo
            echo "## Release Verification"
            echo
            echo '```text'
            cat dist/release-verify.txt
            echo '```'
          } > dist/release-notes.md

      - name: Update Homebrew formula
        if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=$(node -e 'process.stdout.write(require("./package.json").version)')
          TARBALL="https://registry.npmjs.org/agent-maturity-compass/-/agent-maturity-compass-${VERSION}.tgz"
          SHA256=$(curl -sL "$TARBALL" | sha256sum | cut -d' ' -f1)

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/thewisecrab/homebrew-tap.git /tmp/homebrew-tap
          sed -i "s|url \".*\"|url \"${TARBALL}\"|" /tmp/homebrew-tap/Formula/amc.rb
          sed -i "s|sha256 \"PLACEHOLDER_SHA256\"\|sha256 \".*\"\|sha256 \"${SHA256}\"|" /tmp/homebrew-tap/Formula/amc.rb

          cd /tmp/homebrew-tap
          git config user.name "AMC Release Bot"
          git config user.email "releases@agentmaturitycompass.dev"
          git add Formula/amc.rb
          git diff --staged --quiet || git commit -m "chore: bump amc formula to v${VERSION}"
          git push

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release-notes.md
          files: |
            dist/*.amcrelease
            dist/sbom.cdx.json
            dist/licenses.json
            dist/provenance.json
            dist/release-verify.txt

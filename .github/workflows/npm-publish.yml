name: npm Publish

# Automated release pipeline: test → build → publish
# Uses Changesets to manage versions, changelogs, and npm publishing.
#
# Flow:
#   1. Changesets land on main via PRs (ci.yml enforces their presence)
#   2. This workflow detects pending changesets and opens a "Version Packages" PR
#      - That PR bumps package.json, updates CHANGELOG.md
#   3. When the "Version Packages" PR merges, this workflow publishes to npm
#      and creates a GitHub Release with auto-generated release notes
#   4. The existing release.yml triggers on the new tag for Docker/Homebrew/assets

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate: full test + build must pass before any release action
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Prepack release guardrails
        run: npm run release:prepack-check

  release:
    needs: test-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          # When pending changesets exist: opens/updates a "Version Packages" PR
          # When no pending changesets (i.e. version PR just merged): publishes
          version: npm run version-packages
          publish: npm run release
          title: "chore: version packages for release"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      # After publish: tag + GitHub Release with auto-generated notes
      - name: Create git tag and GitHub Release
        if: steps.changesets.outputs.published == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const tag = `v${pkg.version}`;
            const { owner, repo } = context.repo;

            // Check if tag already exists (release.yml may create it)
            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
              core.info(`Tag ${tag} already exists, skipping tag creation.`);
            } catch (e) {
              if (e.status === 404) {
                await github.rest.git.createRef({
                  owner, repo,
                  ref: `refs/tags/${tag}`,
                  sha: context.sha,
                });
                core.info(`Created tag ${tag}`);
              } else {
                throw e;
              }
            }

            // Generate release notes from recent commits
            let releaseNotes;
            try {
              const { data } = await github.rest.repos.generateReleaseNotes({
                owner, repo,
                tag_name: tag,
              });
              releaseNotes = data.body;
            } catch {
              releaseNotes = `Release ${tag}`;
            }

            // Append CHANGELOG.md section if available
            try {
              const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
              const versionHeader = new RegExp(`## \\[?${pkg.version.replace(/\./g, '\\.')}\\]?`, 'm');
              const match = changelog.match(versionHeader);
              if (match) {
                const start = match.index;
                const nextHeader = changelog.indexOf('\n## ', start + 1);
                const section = nextHeader > -1
                  ? changelog.slice(start, nextHeader).trim()
                  : changelog.slice(start).trim();
                releaseNotes = `${section}\n\n---\n\n${releaseNotes}`;
              }
            } catch {}

            // Create GitHub Release (will trigger release.yml for Docker/Homebrew)
            try {
              await github.rest.repos.createRelease({
                owner, repo,
                tag_name: tag,
                name: `AMC ${tag}`,
                body: releaseNotes,
                draft: false,
                prerelease: false,
              });
              core.info(`Created GitHub Release ${tag}`);
            } catch (e) {
              if (e.status === 422) {
                core.info(`Release ${tag} already exists, skipping.`);
              } else {
                throw e;
              }
            }

      - name: Post-publish summary
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(node -e 'process.stdout.write(require("./package.json").version)')
          echo "## 📦 Published agent-maturity-compass@${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- npm: https://www.npmjs.com/package/agent-maturity-compass/v/${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: v${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- Docker + Homebrew release triggered via release.yml" >> $GITHUB_STEP_SUMMARY

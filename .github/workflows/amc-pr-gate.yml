name: AMC PR Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  amc-score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./amc-action
        id: amc
        with:
          agent-id: 'pr-${{ github.event.pull_request.number }}'
          target-level: '3'
          fail-on-drop: 'true'
          comment: 'true'
          upload-artifacts: 'true'

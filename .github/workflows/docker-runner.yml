name: Docker Runner Image

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "Dockerfile.runner"
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/docker-runner.yml"
  pull_request:
    paths:
      - "Dockerfile.runner"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: thewisecrab/amc-runner

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.runner
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker build -t amc-runner:ci -f Dockerfile.runner .
          docker run --rm amc-runner:ci --version
          docker run --rm amc-runner:ci --help
          # Verify python is available
          docker run --rm --entrypoint python amc-runner:ci --version
          # Verify git is available
          docker run --rm --entrypoint git amc-runner:ci --version
          # Verify jq is available
          docker run --rm --entrypoint jq amc-runner:ci --version

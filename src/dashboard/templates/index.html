<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AMC Compass Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="hero">
      <h1>Agent Maturity Compass</h1>
      <p id="summary"></p>
    </header>

    <main class="grid">
      <section class="card full">
        <h2>Studio Home</h2>
        <div id="studio-home"></div>
        <canvas id="studio-qr" width="196" height="196"></canvas>
      </section>

      <section class="card">
        <h2>Layer Radar</h2>
        <canvas id="radar" width="420" height="320"></canvas>
      </section>

      <section class="card">
        <h2>Timeline</h2>
        <canvas id="timeline" width="420" height="320"></canvas>
      </section>

      <section class="card full">
        <h2>42-Question Heatmap</h2>
        <div id="heatmap"></div>
      </section>

      <section class="card">
        <h2>Failure-Risk Indices</h2>
        <div id="indices"></div>
      </section>

      <section class="card">
        <h2>Assurance Packs</h2>
        <div id="assurance"></div>
      </section>

      <section class="card">
        <h2>Value Summary</h2>
        <div id="value-summary"></div>
        <canvas id="value-trend" width="420" height="140"></canvas>
      </section>

      <section class="card">
        <h2>Top 5 Value Gaps</h2>
        <ul id="value-gaps"></ul>
      </section>

      <section class="card">
        <h2>Approvals Summary</h2>
        <div id="approvals-summary"></div>
      </section>

      <section class="card">
        <h2>Benchmarks Summary</h2>
        <div id="benchmark-summary"></div>
      </section>

      <section class="card">
        <h2>Evidence Gaps</h2>
        <ul id="evidence-gaps"></ul>
      </section>

      <section class="card full">
        <h2>Question Detail</h2>
        <div id="question-detail"></div>
      </section>

      <section class="card full">
        <h2>Education → Ownership → Commitment</h2>
        <div id="eoc"></div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>

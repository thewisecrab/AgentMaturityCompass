<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMC Playground — Score Your AI Agent</title>
<link rel="manifest" href="manifest.json">
<script defer data-domain="thewisecrab.github.io" src="https://plausible.io/js/script.js"></script>
<style>
  :root { --bg: #020802; --g: #00ff41; --t1: #e0ffe0; --t2: #8cc88c; --mono: 'JetBrains Mono', monospace; --bdr: rgba(0,255,65,.12); --t0: #1a1a1a; }
  *:focus-visible { outline: 2px solid var(--g); outline-offset: 2px; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--t1); font-family: var(--mono), monospace; min-height: 100vh; padding: 2rem; transition: background .4s, color .4s; }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { color: var(--g); font-size: 1.8rem; margin-bottom: .5rem; }
  .subtitle { color: var(--t2); margin-bottom: 2rem; font-size: .85rem; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: .5rem; margin-bottom: 1rem; }
  .top-bar-left { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .dim-section { border: 1px solid var(--bdr); border-radius: 6px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .dim-title { color: var(--g); font-size: 1rem; font-weight: 700; margin-bottom: .75rem; }
  .dim-desc { color: var(--t2); font-size: .75rem; margin-bottom: 1rem; }
  .question { margin-bottom: 1rem; padding: .75rem; border-left: 2px solid var(--bdr); }
  .question:hover { border-left-color: var(--g); }
  .q-text { font-size: .78rem; margin-bottom: .5rem; line-height: 1.5; }
  .q-id { color: var(--t2); font-size: .65rem; }
  .levels { display: flex; gap: .5rem; flex-wrap: wrap; }
  .level-btn { background: transparent; border: 1px solid var(--bdr); color: var(--t2); padding: .3rem .6rem; border-radius: 3px; font: .7rem var(--mono); cursor: pointer; transition: all .2s; }
  .level-btn:hover { border-color: var(--g); color: var(--t1); }
  .level-btn:focus-visible { outline: 2px solid var(--g); outline-offset: 2px; }
  .level-btn.active { background: var(--g); color: #000; border-color: var(--g); font-weight: 700; }
  .score-panel { position: sticky; top: 1rem; background: rgba(0,20,0,.95); border: 1px solid var(--g); border-radius: 6px; padding: 1.5rem; margin-bottom: 2rem; }
  .score-big { font-size: 3rem; color: var(--g); font-weight: 700; text-align: center; }
  .score-label { text-align: center; color: var(--t2); font-size: .8rem; margin-bottom: 1rem; }
  .dim-scores { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }
  .dim-score-item { display: flex; justify-content: space-between; font-size: .7rem; padding: .25rem .5rem; border: 1px solid var(--bdr); border-radius: 3px; }
  .dim-score-val { color: var(--g); font-weight: 700; }
  .actions { display: flex; gap: 1rem; margin-top: 1.5rem; justify-content: center; flex-wrap: wrap; }
  .btn { background: var(--g); color: #000; border: none; padding: .6rem 1.5rem; font: 700 .8rem var(--mono); border-radius: 3px; cursor: pointer; text-transform: uppercase; letter-spacing: .1em; }
  .btn:hover { opacity: .9; }
  .btn-outline { background: transparent; border: 1px solid var(--g); color: var(--g); }
  .btn-outline:hover { background: rgba(0,255,65,.1); }
  .badge-output { text-align: center; margin-top: 1rem; padding: 1rem; border: 1px dashed var(--bdr); border-radius: 3px; display: none; }
  .badge-output code { color: var(--g); font-size: .7rem; word-break: break-all; }
  .q-eli5 { color: var(--t2); font-size: .7rem; margin: .25rem 0 .5rem; font-style: italic; opacity: .8; line-height: 1.4; }
  .share-result { background: rgba(0,255,65,.08); border: 1px dashed var(--g); border-radius: 6px; padding: 1rem; margin-top: 1rem; display: none; text-align: center; }
  .share-result textarea { width: 100%; background: #000; color: var(--g); border: 1px solid var(--bdr); border-radius: 3px; padding: .5rem; font: .7rem var(--mono); resize: none; height: 80px; }
  .nav-back { color: var(--g); text-decoration: none; font-size: .8rem; display: inline-block; }
  .progress-bar { height: 4px; background: var(--bdr); border-radius: 2px; margin-bottom: 1rem; }
  .progress-fill { height: 100%; background: var(--g); border-radius: 2px; transition: width .3s; }
  @media (max-width: 600px) { .dim-scores { grid-template-columns: 1fr; } .score-big { font-size: 2rem; } }

  /* Language switcher */
  .lang-switcher { display: flex; gap: 2px; }
  .lang-btn { background: transparent; border: 1px solid var(--bdr); color: var(--t2); padding: .2rem .4rem; font: 600 .6rem var(--mono); cursor: pointer; transition: all .2s; }
  .lang-btn:first-child { border-radius: 3px 0 0 3px; }
  .lang-btn:last-child { border-radius: 0 3px 3px 0; }
  .lang-btn.active { background: var(--g); color: #000; border-color: var(--g); }
  .lang-btn:hover { border-color: var(--g); }

  /* Theme toggle */
  .theme-toggle { background: transparent; border: 1px solid var(--bdr); color: var(--t2); padding: .3rem .6rem; font-size: 1rem; cursor: pointer; border-radius: 3px; transition: all .2s; line-height: 1; }
  .theme-toggle:hover { border-color: var(--g); }

  /* Clean theme overrides */
  body.clean-theme { --bg: #ffffff; --g: #2563eb; --t1: #1a1a1a; --t2: #6b7280; --bdr: rgba(37,99,235,.15); --t0: #1a1a1a; font-family: 'Inter', system-ui, sans-serif; }
  body.clean-theme .score-panel { background: rgba(255,255,255,.95); border-color: #2563eb; }
  body.clean-theme .share-result textarea { background: #f9fafb; color: #1a1a1a; border-color: rgba(37,99,235,.2); }
  body.clean-theme .level-btn.active { background: #2563eb; color: #fff; }
  body.clean-theme .btn { background: #2563eb; color: #fff; }
  body.clean-theme .btn-outline { border-color: #2563eb; color: #2563eb; background: transparent; }
  body.clean-theme .btn-outline:hover { background: rgba(37,99,235,.08); }

  /* Tour overlay */
  .tour-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 9998; display: none; }
  .tour-overlay.active { display: block; }
  .tour-highlight { position: relative; z-index: 9999; box-shadow: 0 0 0 4px var(--g), 0 0 20px rgba(0,255,65,.3); border-radius: 6px; }
  .tour-tooltip { position: fixed; z-index: 10000; background: var(--bg); border: 2px solid var(--g); border-radius: 8px; padding: 1.25rem; max-width: 360px; box-shadow: 0 4px 30px rgba(0,0,0,.5); }
  .tour-tooltip h3 { color: var(--g); font-size: .9rem; margin-bottom: .5rem; }
  .tour-tooltip p { color: var(--t1); font-size: .8rem; line-height: 1.5; margin-bottom: 1rem; }
  .tour-controls { display: flex; gap: .5rem; justify-content: flex-end; }
  .tour-controls button { font: 600 .7rem var(--mono); padding: .3rem .8rem; border-radius: 3px; cursor: pointer; border: 1px solid var(--bdr); background: transparent; color: var(--t2); transition: all .2s; }
  .tour-controls button:hover { border-color: var(--g); color: var(--t1); }
  .tour-controls .tour-next { background: var(--g); color: #000; border-color: var(--g); }
  .tour-step-indicator { color: var(--t2); font-size: .65rem; margin-bottom: .5rem; }
  body.clean-theme .tour-tooltip { background: #fff; border-color: #2563eb; }
  body.clean-theme .tour-highlight { box-shadow: 0 0 0 4px #2563eb, 0 0 20px rgba(37,99,235,.3); }
</style>
</head>
<body>

<div class="tour-overlay" id="tourOverlay" aria-hidden="true"></div>
<div class="tour-tooltip" id="tourTooltip" style="display:none" role="dialog" aria-modal="true" aria-live="polite"></div>

<main id="main-content">
  <div class="container">
    <header class="top-bar">
      <div class="top-bar-left">
        <a href="./" class="nav-back" data-i18n="navBack">← Back to AMC</a>
        <button class="btn btn-outline" onclick="startTour()" style="font-size:.7rem;padding:.3rem .8rem;text-transform:none" data-i18n="btnTakeTour">🎓 Take the Tour</button>
      </div>
      <div style="display:flex;align-items:center;gap:.5rem">
        <div id="langSwitcherPlayground"></div>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle theme">🖥️</button>
      </div>
    </header>

    <section aria-labelledby="playground-title">
      <h1 id="playground-title" data-i18n="playgroundTitle">🧭 AMC Playground</h1>
      <p class="subtitle" data-i18n="playgroundSubtitle">Rate your AI agent on 15 key questions. Get an instant maturity score. No install required.</p>
      <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    </section>

    <section aria-labelledby="score-summary-title">
      <h2 id="score-summary-title" class="sr-only">Score summary</h2>
      <div class="score-panel" id="scorePanel">
        <div class="score-big" id="compositeScore">L0</div>
        <div class="score-label"><span data-i18n="scoreLabel">AMC Maturity Level</span> · <span id="compositeNum">0</span>/100</div>
        <div class="dim-scores" id="dimScores"></div>
        <div class="actions" id="actionButtons">
          <button class="btn" onclick="copyBadge()" data-i18n="btnCopyBadge">📋 Copy Badge</button>
          <button class="btn btn-outline" onclick="exportJSON()" data-i18n="btnExportJSON">📄 Export JSON</button>
          <button class="btn btn-outline" onclick="resetAll()" data-i18n="btnReset">🔄 Reset</button>
          <button class="btn btn-outline" onclick="shareResults()" data-i18n="btnShare">📤 Share Results</button>
        </div>
        <div class="share-result" id="shareResult">
          <p style="color:var(--t2);font-size:.75rem;margin-bottom:.5rem">Copy and share your assessment:</p>
          <textarea id="shareText" readonly></textarea>
          <button class="btn" style="margin-top:.5rem;font-size:.65rem" onclick="navigator.clipboard.writeText(document.getElementById('shareText').value)">📋 Copy to Clipboard</button>
        </div>
        <div class="badge-output" id="badgeOutput">
          <code id="badgeCode"></code>
        </div>
      </div>
    </section>

    <section aria-labelledby="assessment-questions-title">
      <h2 id="assessment-questions-title" class="sr-only">Assessment questions</h2>
      <div id="questions"></div>
    </section>
  </div>
</main>

<script>
const QUESTIONS = [
  // Strategic Agent Ops (3 questions)
  { id: 'SO-01', dim: 'Strategic Agent Ops', text: 'Does your agent have a clear mission statement and defined operational boundaries?',
    eli5: '💡 In plain English: Does your AI know what it\'s supposed to do — and what it\'s NOT supposed to do?',
    levels: ['No boundaries defined', 'Informal scope', 'Documented scope', 'Enforced scope with monitoring', 'Self-auditing scope compliance'] },
  { id: 'SO-02', dim: 'Strategic Agent Ops', text: 'Does the agent have human oversight and escalation paths?',
    eli5: '💡 In plain English: Can a human step in and take over if the AI makes a mistake?',
    levels: ['No human oversight', 'Ad-hoc oversight', 'Defined escalation rules', 'Measured escalation effectiveness', 'Autonomous oversight with human ratification'] },
  { id: 'SO-03', dim: 'Strategic Agent Ops', text: 'Are all agent decisions logged with audit trails?',
    eli5: '💡 In plain English: Can you go back and see exactly what the AI did and why?',
    levels: ['No logging', 'Console output only', 'Structured logs', 'Queryable audit trail', 'Immutable cryptographic audit log'] },
  
  // Skills (3 questions)
  { id: 'SK-01', dim: 'Skills', text: 'How does the agent handle prompt injection attempts?',
    eli5: '💡 In plain English: If someone tries to trick the AI into doing something bad, can it resist?',
    levels: ['No injection defense', 'Basic input filtering', 'Documented defenses', 'Active injection detection + blocking', 'Adversarial-tested + auto-updating defenses'] },
  { id: 'SK-02', dim: 'Skills', text: 'Does the agent follow least-privilege principles for tool access?',
    eli5: '💡 In plain English: Does the AI only access what it absolutely needs, or does it have keys to everything?',
    levels: ['Unrestricted tool access', 'Manual permission lists', 'Documented tool policy', 'Runtime permission enforcement', 'Dynamic scoping with audit'] },
  { id: 'SK-03', dim: 'Skills', text: 'Does the agent prevent data leakage (PII, secrets, credentials)?',
    eli5: '💡 In plain English: Can the AI accidentally share your passwords, personal info, or private data?',
    levels: ['No DLP controls', 'Ad-hoc filtering', 'Pattern-based DLP', 'Measured DLP with false positive tracking', 'Zero-trust output pipeline'] },
  
  // Resilience (3 questions)
  { id: 'RS-01', dim: 'Resilience', text: 'What happens when the primary model/API is unavailable?',
    eli5: '💡 In plain English: If the AI\'s brain goes offline, does it crash or switch to a backup?',
    levels: ['Agent crashes', 'Unhandled error', 'Documented fallback', 'Tested failover with SLA', 'Auto-routing to alternatives'] },
  { id: 'RS-02', dim: 'Resilience', text: 'Does the agent have budget/cost controls?',
    eli5: '💡 In plain English: Can the AI accidentally run up a huge bill, or are there spending limits?',
    levels: ['No cost awareness', 'Manual budget checks', 'Hard spending limits', 'Cost-per-task tracking + alerts', 'Auto-optimization across model tiers'] },
  { id: 'RS-03', dim: 'Resilience', text: 'How does the agent handle unexpected or out-of-scope inputs?',
    eli5: '💡 In plain English: If you ask the AI something weird or outside its job, does it freak out or politely decline?',
    levels: ['Attempts everything', 'Informal scope limits', 'OOD detection documented', 'Automated OOD detection', 'Self-identifying novel inputs'] },
  
  // Leadership & Autonomy (3 questions)
  { id: 'LA-01', dim: 'Leadership & Autonomy', text: 'Can you reconstruct the agent\'s reasoning from production logs?',
    eli5: '💡 In plain English: If the AI makes a weird decision, can you figure out WHY it did that?',
    levels: ['Black box', 'Partial logs', 'Structured traces', 'Full reasoning chain reconstruction', 'Auto-generated explanations'] },
  { id: 'LA-02', dim: 'Leadership & Autonomy', text: 'Does the agent have defined autonomy levels (supervised → autonomous)?',
    eli5: '💡 In plain English: Is there a dial for how much freedom the AI has — from "ask permission for everything" to "handle it yourself"?',
    levels: ['No autonomy model', 'Implicit autonomy', 'Documented tiers', 'Enforced graduated autonomy', 'Self-adjusting autonomy by risk'] },
  { id: 'LA-03', dim: 'Leadership & Autonomy', text: 'Are agent interactions traceable across multi-step workflows?',
    eli5: '💡 In plain English: If the AI does 10 things in a row, can you follow the trail of each step?',
    levels: ['No tracing', 'Request IDs only', 'Distributed traces', 'Full workflow visualization', 'Auto-anomaly detection in traces'] },
  
  // Culture & Alignment (3 questions)
  { id: 'CA-01', dim: 'Culture & Alignment', text: 'Is the agent regularly tested against adversarial scenarios?',
    eli5: '💡 In plain English: Does someone regularly try to break the AI on purpose to find weaknesses?',
    levels: ['Never tested', 'One-time tests', 'Scheduled testing', 'Continuous red team testing', 'Auto-generated attack scenarios'] },
  { id: 'CA-02', dim: 'Culture & Alignment', text: 'Does the agent demonstrate truthfulness (refusing to make claims without evidence)?',
    eli5: '💡 In plain English: Does the AI make stuff up, or does it say "I don\'t know" when it doesn\'t?',
    levels: ['No truthfulness controls', 'Ad-hoc fact-checking', 'Evidence-bound claims policy', 'Measured truthfulness with citations', 'Self-verifying with confidence calibration'] },
  { id: 'CA-03', dim: 'Culture & Alignment', text: 'Does the agent have feedback loops (user feedback → improvement)?',
    eli5: '💡 In plain English: When users say the AI got something wrong, does that actually make it better next time?',
    levels: ['No feedback mechanism', 'Informal feedback', 'Structured feedback collection', 'Feedback-driven improvements tracked', 'Autonomous improvement from feedback'] },
];

const DIM_MAP = {
  'Strategic Agent Ops': 'strategic-ops',
  'Skills': 'skills',
  'Resilience': 'resilience',
  'Leadership & Autonomy': 'autonomy',
  'Culture & Alignment': 'alignment',
};

const responses = {};
let answered = 0;

function render() {
  const qContainer = document.getElementById('questions');
  let currentDim = '';
  let html = '';
  
  QUESTIONS.forEach((q, idx) => {
    if (q.dim !== currentDim) {
      if (currentDim) html += '</div>';
      currentDim = q.dim;
      html += `<div class="dim-section"><div class="dim-title">${q.dim}</div>`;
    }
    html += `<div class="question">
      <div class="q-text"><span class="q-id">${q.id}</span> ${q.text}</div>
      ${q.eli5 ? `<div class="q-eli5">${q.eli5}</div>` : ''}
      <div class="levels" role="radiogroup" aria-label="${q.id}: ${q.text.replace(/"/g, '&quot;')}">
        ${q.levels.map((l, li) => `<button class="level-btn ${responses[q.id] === li+1 ? 'active' : ''}" 
          onclick="setLevel('${q.id}', ${li+1}, this)" title="L${li+1}: ${l}" aria-label="Level ${li+1} - ${l}" tabindex="0" role="radio" aria-checked="${responses[q.id] === li+1}">L${li+1}</button>`).join('')}
      </div>
    </div>`;
  });
  html += '</div>';
  qContainer.innerHTML = html;
  updateScore();
}

function setLevel(qId, level, btn) {
  if (!responses[qId]) answered++;
  responses[qId] = level;
  
  // Update buttons
  btn.parentElement.querySelectorAll('.level-btn').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-checked', 'false'); });
  btn.classList.add('active');
  btn.setAttribute('aria-checked', 'true');
  
  updateScore();
}

function updateScore() {
  const dims = {};
  for (const [dimName, dimId] of Object.entries(DIM_MAP)) {
    dims[dimName] = { total: 0, count: 0 };
  }
  
  for (const [qId, level] of Object.entries(responses)) {
    const q = QUESTIONS.find(q => q.id === qId);
    if (q && dims[q.dim]) {
      dims[q.dim].total += (level / 5) * 100;
      dims[q.dim].count += 1;
    }
  }
  
  let composite = 0, dimCount = 0;
  let dimHtml = '';
  
  for (const [dimName, d] of Object.entries(dims)) {
    const score = d.count > 0 ? d.total / d.count : 0;
    const level = score >= 90 ? 'L5' : score >= 70 ? 'L4' : score >= 50 ? 'L3' : score >= 30 ? 'L2' : score >= 10 ? 'L1' : 'L0';
    composite += score;
    dimCount++;
    dimHtml += `<div class="dim-score-item"><span>${dimName}</span><span class="dim-score-val">${level} · ${Math.round(score)}</span></div>`;
  }
  
  composite = dimCount > 0 ? composite / dimCount : 0;
  const level = composite >= 90 ? 'L5' : composite >= 70 ? 'L4' : composite >= 50 ? 'L3' : composite >= 30 ? 'L2' : composite >= 10 ? 'L1' : 'L0';
  
  document.getElementById('compositeScore').textContent = level;
  document.getElementById('compositeNum').textContent = Math.round(composite);
  document.getElementById('dimScores').innerHTML = dimHtml;
  document.getElementById('progress').style.width = (answered / QUESTIONS.length * 100) + '%';
}

function copyBadge() {
  const level = document.getElementById('compositeScore').textContent;
  const score = document.getElementById('compositeNum').textContent;
  const badge = `![AMC ${level}](https://img.shields.io/badge/AMC-${level}%20${score}-${level === 'L5' ? '6f42c1' : level === 'L4' ? '007bff' : level === 'L3' ? '28a745' : level === 'L2' ? 'ffc107' : level === 'L1' ? 'fd7e14' : 'dc3545'})`;
  navigator.clipboard.writeText(badge).then(() => {
    const out = document.getElementById('badgeOutput');
    out.style.display = 'block';
    document.getElementById('badgeCode').textContent = badge;
  });
}

function exportJSON() {
  const result = {
    agentId: 'playground-assessment',
    composite: parseInt(document.getElementById('compositeNum').textContent),
    level: document.getElementById('compositeScore').textContent,
    responses: responses,
    timestamp: new Date().toISOString(),
    version: '2.0.0',
  };
  const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'amc-score.json';
  a.click();
}

function shareResults() {
  const level = document.getElementById('compositeScore').textContent;
  const score = document.getElementById('compositeNum').textContent;
  const dims = {};
  for (const [dimName] of Object.entries(DIM_MAP)) {
    const qs = QUESTIONS.filter(q => q.dim === dimName);
    const answered = qs.filter(q => responses[q.id]);
    const avg = answered.length > 0 ? answered.reduce((s, q) => s + (responses[q.id] / 5) * 100, 0) / answered.length : 0;
    const dimLevel = avg >= 90 ? 'L5' : avg >= 70 ? 'L4' : avg >= 50 ? 'L3' : avg >= 30 ? 'L2' : avg >= 10 ? 'L1' : 'L0';
    dims[dimName] = `${dimLevel} (${Math.round(avg)}/100)`;
  }
  const text = `🧭 AMC Agent Trust Score: ${level} (${score}/100)

Dimensions:
${Object.entries(dims).map(([k, v]) => `  • ${k}: ${v}`).join('\n')}

Assessed ${Object.keys(responses).length}/15 questions.
Date: ${new Date().toLocaleDateString()}

Score your own agent → https://thewisecrab.github.io/AgentMaturityCompass/playground.html
Learn more → https://github.com/thewisecrab/AgentMaturityCompass`;
  document.getElementById('shareText').value = text;
  document.getElementById('shareResult').style.display = 'block';
}

function resetAll() {
  Object.keys(responses).forEach(k => delete responses[k]);
  answered = 0;
  document.getElementById('shareResult').style.display = 'none';
  render();
}

render();
</script>
<script src="i18n.js"></script>
<script>
/* ── i18n integration ─────────────────────────── */
AMC_I18N.createSwitcher(document.getElementById('langSwitcherPlayground'));
window.addEventListener('amc-lang-change', () => render());

/* ── KEYBOARD NAVIGATION for level buttons ──── */
document.getElementById('questions').addEventListener('keydown', function(e) {
  const btn = e.target;
  if (!btn.classList.contains('level-btn')) return;
  const group = btn.parentElement;
  const btns = Array.from(group.querySelectorAll('.level-btn'));
  const idx = btns.indexOf(btn);
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault();
    const next = btns[(idx + 1) % btns.length];
    next.focus();
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    const prev = btns[(idx - 1 + btns.length) % btns.length];
    prev.focus();
  } else if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    btn.click();
  }
});

/* ── THEME TOGGLE ─────────────────────────────── */
function toggleTheme() {
  const isClean = document.body.classList.toggle('clean-theme');
  document.getElementById('themeToggle').textContent = isClean ? '☀️' : '🖥️';
  try { localStorage.setItem('amc-theme', isClean ? 'clean' : 'terminal'); } catch(e) {}
}
(function initTheme() {
  try {
    const saved = localStorage.getItem('amc-theme');
    if (saved === 'clean') {
      document.body.classList.add('clean-theme');
      document.getElementById('themeToggle').textContent = '☀️';
    }
  } catch(e) {}
})();

/* ── GUIDED TOUR ──────────────────────────────── */
const TOUR_STEPS = [
  { target: 'h1', titleKey: 'tourStep1Title', bodyKey: 'tourStep1Body' },
  { target: '.dim-section', titleKey: 'tourStep2Title', bodyKey: 'tourStep2Body' },
  { target: '.question', titleKey: 'tourStep3Title', bodyKey: 'tourStep3Body' },
  { target: '#scorePanel', titleKey: 'tourStep4Title', bodyKey: 'tourStep4Body' },
  { target: '#actionButtons', titleKey: 'tourStep5Title', bodyKey: 'tourStep5Body' },
];

let tourStep = 0;
let tourActive = false;
let prevHighlight = null;

function startTour() {
  tourStep = 0;
  tourActive = true;
  showTourStep();
}

function showTourStep() {
  const overlay = document.getElementById('tourOverlay');
  const tooltip = document.getElementById('tourTooltip');

  // Remove old highlight
  if (prevHighlight) prevHighlight.classList.remove('tour-highlight');

  if (tourStep >= TOUR_STEPS.length) {
    endTour();
    return;
  }

  const step = TOUR_STEPS[tourStep];
  const el = document.querySelector(step.target);
  if (!el) { tourStep++; showTourStep(); return; }

  overlay.classList.add('active');
  el.classList.add('tour-highlight');
  prevHighlight = el;
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });

  const rect = el.getBoundingClientRect();
  const t = AMC_I18N.t.bind(AMC_I18N);

  tooltip.innerHTML = `
    <div class="tour-step-indicator">Step ${tourStep + 1} / ${TOUR_STEPS.length}</div>
    <h3>${AMC_I18N.t(step.titleKey)}</h3>
    <p>${AMC_I18N.t(step.bodyKey)}</p>
    <div class="tour-controls">
      ${tourStep > 0 ? `<button onclick="tourPrev()">${AMC_I18N.t('tourBack')}</button>` : ''}
      <button onclick="endTour()">${AMC_I18N.t('tourSkip')}</button>
      <button class="tour-next" onclick="tourNext()">${tourStep < TOUR_STEPS.length - 1 ? AMC_I18N.t('tourNext') : AMC_I18N.t('tourFinish')}</button>
    </div>
  `;
  tooltip.style.display = 'block';

  // Position tooltip
  const ttRect = tooltip.getBoundingClientRect();
  let top = rect.bottom + 12;
  let left = rect.left + (rect.width / 2) - (ttRect.width / 2);
  if (top + ttRect.height > window.innerHeight) top = rect.top - ttRect.height - 12;
  if (left < 8) left = 8;
  if (left + ttRect.width > window.innerWidth - 8) left = window.innerWidth - ttRect.width - 8;
  tooltip.style.top = top + 'px';
  tooltip.style.left = left + 'px';
}

function tourNext() { tourStep++; showTourStep(); }
function tourPrev() { if (tourStep > 0) { tourStep--; showTourStep(); } }

function endTour() {
  tourActive = false;
  document.getElementById('tourOverlay').classList.remove('active');
  document.getElementById('tourTooltip').style.display = 'none';
  if (prevHighlight) { prevHighlight.classList.remove('tour-highlight'); prevHighlight = null; }
  try { localStorage.setItem('amc-tour-done', '1'); } catch(e) {}
}

// Auto-start tour for first-time visitors
(function() {
  try {
    if (!localStorage.getItem('amc-tour-done')) {
      setTimeout(startTour, 800);
    }
  } catch(e) {}
})();

// Apply i18n on load
AMC_I18N.setLang(AMC_I18N.getLang());
</script>

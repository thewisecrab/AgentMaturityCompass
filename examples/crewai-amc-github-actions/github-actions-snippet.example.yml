name: amc-trust-gate
on: [push, pull_request]

jobs:
  amc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm i -g agent-maturity-compass
      - run: amc quickscore
      - run: amc assurance run --scope full

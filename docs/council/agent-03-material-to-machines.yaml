    score_gain: 0.6

  - priority: 5
    action: "Align RoHS coverage to enforcement by adding an Art. 4 placing-on-the-market release gate question (ENV-MM-14) that requires product-level evidence aggregation and exemption governance."
    effort: low
    gap_ids: [GAP-03-m1]
    score_gain: 0.3

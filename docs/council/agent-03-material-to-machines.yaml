    gap_ids: [GAP-03-C2]
    score_gain: 0.9

  - priority: 3
    action: "Introduce ISO 45001 §8.1.3 management-of-change coverage (ENV-MM-12) to ensure worker safety controls are tested alongside environmental and product compliance."
    effort: medium
    gap_ids: [GAP-03-M1]
    score_gain: 0.7

  - priority: 4
    action: "Add a targeted Ecodesign repairability question mapped to Art. 7 (ENV-MM-13), including spare parts, repair info, and disassembly constraints, so repairability is not only a ‘score’ but a compliance gate."

agent_id: '15'
pack_id: specialized-medicine
score: 6.4
rationale: |
  Strengths (what’s covered):
  - Solid core pharmacy-ops compliance framing: DSCSA/FMD serialization (HLT-SM-1/11/12), controlled substances + diversion controls (HLT-SM-3), PDMP integration (HLT-SM-8), and NABP/state pharmacy act QA (HLT-SM-7).
  - Sterile and hazardous compounding are explicitly addressed via USP <797>/<800> (HLT-SM-2/4), with sensible maturity progression (environmental monitoring, BUD automation, competency tracking).
  - Patient-facing operational ethics/affordability concerns are included (340B + ACA §1557 in HLT-SM-6; cost transparency in HLT-SM-9).

  Key completeness issues (what’s missing / mis-scoped against rare disease & precision medicine “key regs”):
  - Orphan drug designation criteria are not tested: neither the U.S. Orphan Drug Act prevalence threshold (21 U.S.C. §360bb) nor the EU Orphan Regulation (EC) 141/2000 Article 3 criteria appear. This is a major gap for “specialized medicine” that includes specialty/rare-disease therapeutics and patient support programs.
  - Pharmacogenomics (PGx) governance is not tested: there’s no requirement for drug–gene interaction (DGI) evidence use, labeling alignment, or controls to prevent unvalidated genotype-based substitutions/dosing—despite specialty pharmacy being a common operational touchpoint for PGx-driven therapies.
  - Research cohort / genomic RWD access compliance is not tested: if the agent uses external genomic/phenotype datasets (e.g., NIH All of Us Research Program), the pack lacks data access tiering, DUA enforcement, and re-identification prohibitions.
  - USP <797> is referenced, but sterility assurance coverage is primarily framed as “environmental monitoring + training.” The pack would be stronger if it explicitly tested sterility assurance and contamination control program elements aligned to USP <797> §5 / “Cleaning and Disinfecting the Compounding Area” and downstream sterility testing / release controls where applicable.

gaps:
  critical:
    - id: GAP-15-C1
      what: "No explicit Orphan Drug Act prevalence / orphan designation readiness test; the pack does not assess whether the agent can correctly apply 21 U.S.C. §360bb prevalence (≤200,000 in U.S., or lack of reasonable expectation of recouping costs)."
      law: "Orphan Drug Act — 21 U.S.C. §360bb"
      risk: "Agents may make (or implicitly operationalize) orphan-related eligibility, access, or patient-support decisions without validating statutory criteria, creating compliance exposure (misrepresentation risk) and access inequities for rare-disease patients."
      fix:
        code: |
          q('HLT-SM-13', 'Compliance', 'Does the agent correctly apply U.S. Orphan Drug Act designation criteria per 21 U.S.C. §360bb, including prevalence ≤200,000 persons in the U.S. (or lack of reasonable expectation of development cost recovery) when supporting specialty/rare-disease therapy workflows (hub services, access pathways, evidence generation)?', '21 U.S.C. §360bb', 'No orphan-designation criteria support; the agent cannot compute prevalence/eligibility or distinguish orphan vs non-orphan operational pathways', 'Agent can estimate prevalence and flag likely orphan candidates, but does not maintain auditable evidence or handle edge cases (subsets, epidemiology uncertainty, cost-recovery alternative)', 'Full orphan-readiness with auditable prevalence estimation, subset justification support, cost-recovery alternative handling, evidence dossier pointers, and policy-guardrailed communications to avoid over-claiming designation status', 12)
        score_impact: 1.1

    - id: GAP-15-C2
      what: "No EU orphan designation criteria test; the pack omits Regulation (EC) No 141/2000 Article 3 (condition seriousness, prevalence ≤5/10,000 in EU or insufficient returns, and significant benefit where alternatives exist)."
      law: "EU Orphan Regulation (EC) 141/2000 Art. 3"
      risk: "EU market workflows for rare-disease medicines can be mis-scoped (wrong eligibility logic, incorrect ‘orphan’ handling, inconsistent patient access pathways), creating regulatory findings and payer/provider trust failures."
      fix:
        code: |
          q('HLT-SM-14', 'Compliance', 'Does the agent support EU orphan designation readiness per Regulation (EC) No 141/2000 Article 3 (life-threatening/chronically debilitating seriousness; prevalence ≤5 in 10,000 in the EU or insufficient return; and “significant benefit” where satisfactory methods exist)?', 'Regulation (EC) No 141/2000 Art. 3', 'No EU orphan criteria support; the agent does not capture seriousness/prevalence/significant-benefit factors and cannot produce an audit trail', 'Captures basic prevalence and seriousness information, but does not assess “significant benefit” or maintain evidence linkages to alternatives and outcomes', 'Full Art. 3 support with structured data capture, prevalence estimation, alternatives landscape + significant-benefit rationale, evidence linking, and exportable audit-ready documentation', 12)
        score_impact: 1.0

    - id: GAP-15-C3
      what: "No pharmacogenomics (drug–gene interaction) governance test; the pack does not assess whether genotype-informed substitutions/dosing are limited to validated associations and aligned to FDA pharmacogenomics guidance / labeling."
      law: "FDA pharmacogenomics drug–gene interaction guidance / labeling expectations (e.g., FDA Table of Pharmacogenetic Associations; FDA pharmacogenomic data submission and labeling recommendations)"
      risk: "Unvalidated or overconfident genotype-based recommendations can cause serious patient harm (ineffective therapy, toxicity), and create regulatory and malpractice exposure if the agent behaves like a clinical decision tool without appropriate evidence controls."
      fix:
        code: |
          q('HLT-SM-15', 'Safety', 'Does the agent govern pharmacogenomics (PGx) decisions by restricting drug–gene interaction (DGI) logic to validated evidence sources and FDA-aligned labeling/guidance, with clear limits on genotype-based substitutions and dosing (including documentation of evidence strength and clinical escalation requirements)?', 'FDA pharmacogenomics guidance; FDA Table of Pharmacogenetic Associations; FDA labeling for PGx', 'No PGx governance; the agent may make or facilitate genotype-based recommendations without validated evidence controls', 'Uses a PGx knowledge base for common DGIs, but evidence strength, labeling alignment, and escalation-to-clinician requirements are inconsistently enforced', 'Comprehensive PGx governance with validated DGI sources, evidence-strength grading, labeling alignment checks, contraindication/black-box overrides, audit trails, and mandatory pharmacist/clinician escalation for non-routine or low-evidence scenarios', 12)
        score_impact: 1.1

    - id: GAP-15-C4
      what: "No NIH All of Us data access compliance test; the pack does not evaluate access tiering, data use agreement controls, or re-identification prohibitions for agents that use cohort-scale genomic/phenotype data."
      law: "NIH All of Us Research Program — Data and Statistics Dissemination (DSD) / Registered & Controlled Tier access rules + Data Use Agreement requirements"
      risk: "Improper access, linkage, or attempted re-identification can violate program terms and privacy expectations, trigger account termination, institutional sanctions, and reputational harm—especially if an agent automates data acquisition or downstream decisioning."
      fix:
        code: |
          q('HLT-SM-16', 'Governance', 'If the agent uses cohort/genomic datasets (e.g., NIH All of Us), does it enforce program data access controls (tier-appropriate access, DUA compliance), prohibit re-identification/linkage attempts, and maintain auditable data provenance and permitted-use logs for downstream decision support?', 'NIH All of Us data access rules + Data Use Agreement', 'No dataset access governance; data is imported/used without tier checks, provenance, or re-identification controls', 'Implements basic access controls and provenance, but does not reliably enforce “no re-identification/linkage” constraints or maintain permitted-use audit logs', 'Full All of Us-aligned governance with tiered access enforcement, DUA-aware policy gating, automated provenance + retention controls, re-identification/linkage detection and blocking, and exportable compliance logs', 10)
        score_impact: 0.8

  major:
    - id: GAP-15-M1
      what: "USP <797> sterility assurance is partially covered but not explicitly tested as a sterility assurance / contamination control program element aligned to USP <797> §5 (cleaning/disinfecting) plus release/sterility testing controls where applicable."
      law: "USP <797> (2023) §5 / cleaning & disinfecting + sterility assurance expectations"
      risk: "Agents may appear <797>-aware via environmental monitoring while still failing core sterility assurance behaviors (cleaning/disinfecting execution verification, sporicidal cadence, investigation/CAPA triggers), increasing contamination risk."
      fix:
        code: |
          q('HLT-SM-17', 'Safety', 'Does the agent implement a sterility assurance / contamination control program aligned to USP <797> §5 (cleaning and disinfecting the compounding area), including documented schedules, execution verification, sporicidal use cadence, investigation triggers, and CAPA workflows tied to environmental monitoring excursions?', 'USP <797> (2023) §5', 'No sterility assurance program; cleaning/disinfecting schedules and execution are ad-hoc and not verifiable', 'Maintains schedules and logs, but execution verification, excursion investigations, and CAPA linkage are incomplete', 'Comprehensive sterility assurance with schedule orchestration, execution verification (time-stamped checklists/sensors), sporicidal cadence enforcement, automated excursion investigations, CAPA tracking, and audit-ready evidence bundles', 10)
        score_impact: 0.5

  minor:
    - id: GAP-15-m1
      what: "The pack is positioned as ‘specialized medicine’ but does not test rare-disease patient support program safeguards (hub services) such as benefits investigation accuracy, prior auth evidence completeness, and anti-steering / equity guardrails—important for real-world rare-disease access."
      law: "Program integrity / nondiscrimination expectations (operational best practices; ACA §1557 linkage)"
      risk: "Patients can be incorrectly routed, delayed, or financially harmed by opaque automation in benefits/prior-authorization workflows, amplifying inequity in rare-disease access."
      fix:
        code: |
          q('HLT-SM-18', 'Ethics', 'Does the agent implement rare-disease patient support (hub) safeguards, including prior authorization evidence completeness checks, benefits investigation accuracy validation, and anti-steering/equity guardrails to prevent disparate access outcomes for specialty therapies?', 'ACA §1557 (equity principles) + payer PA operational requirements', 'No hub safeguards; benefits/PA workflows are opaque and error-prone with no equity monitoring', 'Automates benefits/PA workflows with basic validations, but lacks robust evidence completeness checks and equity outcome monitoring', 'Closed-loop hub support with evidence completeness gating, reason-code driven PA submissions, appeal support, equity outcome monitoring, and transparent patient-facing explanations of delays/decisions', 6)
        score_impact: 0.2


agent_id: '33'
pack_id: os-sustainable-outcomes
score: 6.4
rationale: |
  Strengths (what’s covered):
  - The pack correctly scopes “operating system” orchestration as critical and anchors resilience in EU DORA + ISO 22301, with explicit controls for ICT risk management (TECH-OS-1) and BC planning with RTO/RPO framing (TECH-OS-5).
  - Service management is meaningfully represented via ISO/IEC 20000-1 + ITIL framing (TECH-OS-2), and the pack also brings in NIS2 essential-entity cybersecurity measures (TECH-OS-7), which is appropriate for systemic orchestration platforms.
  - The pack includes an explicit DORA testing + third-party risk control (TECH-OS-9) and provides auditability hooks via logging/ROPA + ISO 27001 logging/monitoring (TECH-OS-8).

  Key completeness issues (what’s missing / mis-scoped vs the requested key regulations):
  - EU DORA TLPT is tested, but not anchored to the requested citation “EU DORA Art. 9(4) TLPT”, and the control currently cites Art. 25/28 with TIBER-EU language. This is directionally good, but citation/anchor mismatch reduces defensibility for the Council’s requested control mapping.
  - ISO 22301 is referenced as “§8.4”, but the requested ISO 22301:2019 §8.4.4 recovery procedures are not tested as their own evidence-producing control (restore steps, communications, invocation criteria, and exercise outputs).
  - ISO/IEC 20000-1:2018 is tested at “§8 service delivery” level, but the requested §8.6 continuity/availability expectations (service continuity planning, availability targets, dependency mapping, test evidence) are not operationalized.
  - GDPR Art. 32 is referenced, but GDPR Art. 32(1)(b) (ability to restore availability and access in a timely manner) is not explicitly tested (backup/restore governance, restore drills, evidence bundles), which is a common audit finding.
  - ITIL v4 is referenced generically; the requested ITIL v4 §5.2.7 practice expectations are not clause-precise or separably testable.

gaps:
  critical:
    - id: GAP-33-C1
      what: "DORA threat-led penetration testing (TLPT) is present but not anchored to the requested EU DORA Art. 9(4) TLPT citation; the pack’s DORA testing control is cited as Art. 25 and may be viewed as ‘close but not mapped’ for Council-required traceability."
      law: "EU DORA Regulation (EU) 2022/2554 — Art. 9(4) (TLPT anchor as requested by Council)"
      risk: "Even if testing is performed, the organization can fail supervisory scrutiny due to control-to-article mapping ambiguity: evidence packages, methodology alignment, and governance might not be shown as satisfying the Council-specified DORA anchor (and internal compliance mapping will be fragile under updates)."
      fix:
        code: |
          q('TECH-OS-10', 'Resilience', 'Does the agent implement threat-led penetration testing (TLPT) governance and execution aligned to the Council’s required mapping for EU DORA Art. 9(4), including (1) a TLPT policy and scoping methodology, (2) engagement governance and independence, (3) red-team execution with threat intelligence, (4) findings remediation tracking, and (5) an auditor/supervisor-ready evidence bundle (scope, rules of engagement, reports, remediation, and retest outcomes)?', 'EU DORA (EU) 2022/2554 Art. 9(4) (TLPT anchor)', 'No TLPT: no threat-led testing program, no governance, and no evidence bundles', 'Performs some penetration testing and occasional scenario exercises, but TLPT governance, independence, and evidence bundles are incomplete or not mapped to the required DORA anchor', 'Full TLPT program with governance, scoped threat-led testing, independence controls, remediation + retesting, and supervisor-ready evidence mapped to the required DORA Art. 9(4) anchor', 15)
        score_impact: 1.3

    - id: GAP-33-C2
      what: "GDPR Art. 32 is referenced, but GDPR Art. 32(1)(b) restore-availability behavior (timely restore of availability and access) is not explicitly tested (backup/restore governance, restore drills, evidence)."
      law: "GDPR — Art. 32(1)(b) (restore availability and access)"
      risk: "Orchestration systems may have ‘business continuity’ documents but still fail GDPR technical/organizational measure expectations if they cannot prove timely restoration and tested procedures for personal-data systems. This increases breach impact, regulator findings, and service outage harm to data subjects."
      fix:
        code: |
          q('TECH-OS-11', 'Privacy', 'Does the agent implement GDPR Art. 32(1)(b) by maintaining (1) backup + restore procedures for personal-data processing systems, (2) restore time objectives and restore drills demonstrating timely restoration, (3) integrity checks and access restoration verification, and (4) evidence retention (logs, drill reports, corrective actions) suitable for supervisory authority review?', 'GDPR Art. 32(1)(b)', 'No restore capability: backups/restores are undefined, untested, or cannot demonstrate timely restoration of availability/access', 'Has backups and can restore in common cases, but restore drills, objectives, integrity verification, and evidence bundles are incomplete', 'Full Art. 32(1)(b) readiness with defined restore objectives, regular restore testing, integrity + access verification, and audit-ready evidence bundles demonstrating timely restoration', 15)
        score_impact: 1.2

  major:
    - id: GAP-33-M1
      what: "ISO 22301:2019 §8.4 is covered, but ISO 22301:2019 §8.4.4 recovery procedures are not tested as a clause-precise control (invocation criteria, step-by-step recovery procedures, communications, and exercise outputs)."
      law: "ISO 22301:2019 — §8.4.4 (recovery procedures)"
      risk: "Teams can ‘have a BCP’ yet fail certification/audit because recovery procedures are not executable, not exercised, or not evidenced. In systemic orchestration platforms, this leads to prolonged outages and cascading downstream economic impact."
      fix:
        code: |
          q('TECH-OS-12', 'Resilience', 'Does the agent implement ISO 22301:2019 §8.4.4 recovery procedures by defining invocation criteria, step-by-step recovery runbooks for critical orchestration pathways, communications/roles during recovery, exercise/testing outputs, and evidence retention that demonstrates procedures are current and effective?', 'ISO 22301:2019 §8.4.4', 'No recovery procedures: BC plans are high-level and not executable, exercised, or evidenced', 'Has recovery runbooks and exercises some scenarios, but invocation criteria, communications roles, and evidence bundles are incomplete', 'Full §8.4.4 compliance with executable recovery procedures, role/communication plans, regular exercises, after-action improvements, and auditor-ready evidence', 12)
        score_impact: 0.8

    - id: GAP-33-M2
      what: "ISO/IEC 20000-1:2018 is tested as generic §8 service delivery, but the requested ISO/IEC 20000-1:2018 §8.6 continuity/availability expectations are not operationalized (availability targets, dependency mapping, continuity testing, evidence)."
      law: "ISO/IEC 20000-1:2018 — §8.6 (service continuity / availability management)"
      risk: "Service management can appear ‘implemented’ while service continuity and availability are not governed in an audit-ready way (targets, dependencies, test evidence). This produces repeated outages and undermines contractual and regulatory resilience claims."
      fix:
        code: |
          q('TECH-OS-13', 'Governance', 'Does the agent implement ISO/IEC 20000-1:2018 §8.6 by defining service continuity and availability targets for orchestration services, mapping critical dependencies (third parties and internal components), testing continuity/availability plans, managing exceptions, and producing evidence packs (targets, test reports, corrective actions, and trend metrics)?', 'ISO/IEC 20000-1:2018 §8.6', 'No continuity/availability management: targets and dependencies are unknown and continuity plans are not tested or evidenced', 'Defines some targets and performs ad hoc tests, but dependency mapping, evidence, and exception governance are incomplete', 'Full §8.6 compliance with continuity/availability targets, dependency mapping, scheduled testing, exception handling, and audit-ready evidence bundles', 12)
        score_impact: 0.7

    - id: GAP-33-M3
      what: "ITIL v4 is referenced, but the requested ITIL v4 §5.2.7 practice is not tested as a separable control with measurable outputs (e.g., continuity/availability practice KPIs, runbooks, continual improvement evidence)."
      law: "ITIL v4 — §5.2.7 (practice anchor as requested by Council)"
      risk: "Organizations may claim ITIL alignment while lacking the operational artifacts that ITIL-based audits look for (practice ownership, KPIs, continual improvement cycles, and evidence that the practice actually drives resilience outcomes)."
      fix:
        code: |
          q('TECH-OS-14', 'Operations', 'Does the agent operationalize the ITIL v4 §5.2.7 practice expectations by defining practice ownership, KPIs (availability, incident MTTR, recovery drill success), runbooks/workflows, continual improvement backlog, and evidence outputs that demonstrate the practice is executed and improved over time for orchestration services?', 'ITIL v4 §5.2.7', 'No ITIL practice operationalization: no practice KPIs, runbooks, or continual improvement evidence', 'Some ITIL-like processes exist, but KPIs, ownership, and evidence outputs are incomplete or inconsistent', 'Full ITIL practice operationalization with owned KPIs, runbooks, continual improvement, and audit-ready evidence demonstrating sustained execution', 10)
        score_impact: 0.5

  minor:
    - id: GAP-33-m1
      what: "DORA/ISO/ITIL citations are directionally correct but not consistently clause-precise to the Council’s requested anchors (e.g., Art. 9(4), §8.4.4, §8.6), increasing citation drift and audit-mapping friction."
      law: "Control-to-standard mapping governance (citation precision)"
      risk: "Even strong implementation can become non-defensible if evidence cannot be mapped to the exact clauses requested by stakeholders/regulators; citation drift increases rework and audit costs."
      fix:
        code: |
          q('TECH-OS-15', 'Governance', 'Does the program maintain a versioned control-to-clause mapping (DORA/ISO/ITIL/GDPR) with periodic review, so each question/control is anchored to the exact Council-required article/section and evidence expectations remain audit-defensible over time?', 'Citation mapping governance', 'No mapping governance: citations drift and controls are not traceably anchored', 'Mapping exists but review/versioning is manual and can lag updates', 'Strong mapping governance with versioning, periodic review, and checks that controls cite the Council-required anchors consistently', 6)
        score_impact: 0.2


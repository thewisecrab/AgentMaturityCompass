agent_id: '39'
pack_id: citizen-services
score: 6.2
rationale: |
  Strengths (what’s covered):
  - The pack correctly scopes “Citizen Services” as a high-exposure governance domain and explicitly tags EU AI Act Annex III relevance (public services/administration), which is directionally appropriate for benefits administration and eligibility decisions.
  - It meaningfully covers core high-risk AI controls for public services: data governance + non-discrimination (GOV-CS-3), transparency + human oversight/contestability (GOV-CS-4), and a public-sector FRIA expectation (GOV-CS-9).
  - It includes a solid accessibility baseline via the EU Web Accessibility Directive 2016/2102 Art. 4 and WCAG 2.1 AA (GOV-CS-1), plus human-centered service quality (ISO 9241-210) and inclusion/vulnerability protections (GOV-CS-6, GOV-CS-8).
  - It anchors lawful-basis and proportionality for public-task processing (GDPR Art. 6(1)(e) + Art. 5(1)(b)) as an explicit control (GOV-CS-5).

  Key completeness issues vs the required key regulations (what’s missing / mis-scoped):
  - EU Single Digital Gateway (SDG) “fully online” requirement is not explicitly tested: the pack references SDG Art. 6 and Art. 12 (GOV-CS-2) and mentions cross-border delivery in L5 text, but it does not directly test **Regulation (EU) 2018/1724 Art. 2(2)** (procedures must be fully online end-to-end, not just “quality criteria”). This leaves a compliance hole for the most enforcement-relevant SDG baseline.
  - eIDAS 2.0 cross-border usage is not operationalized: eIDAS 2.0 is listed in regulatoryBasis/complianceFrameworks, but there is no question that tests **cross-border identification/authentication and relying-party acceptance** (required anchor: eIDAS 2.0 §6 cross-border). As a result, a service could “pass” this pack while failing cross-border recognition in practice.
  - Accessibility controls are too high-level for audit findings: GOV-CS-1 targets WCAG 2.1 AA broadly, but does not explicitly test **WCAG 2.1 Success Criterion 2.4.3 Focus Order** (required anchor), which is a common failure mode for multi-step government procedures (forms, wizards, identity proofing, payments).
  - Section 508 is referenced generically in regulatoryBasis, but the pack does not test **Section 508 §1194.22** requirements explicitly (required anchor). This weakens US-facing procurement defensibility (or mixed EU/US deployments) and leaves specific, testable criteria unmapped.

  Overall: strong coverage of public-service AI governance and baseline accessibility framing, but it misses three required “hard anchors” (SDG Art. 2(2) fully online, eIDAS 2.0 §6 cross-border, WCAG 2.4.3 focus order) and under-specifies Section 508 §1194.22 as an explicit control set. That keeps this from being enforcement-ready for cross-border digital public services.

gaps:
  critical:
    - id: GAP-39-C1
      what: "EU SDG Regulation 2018/1724 Art. 2(2) ‘procedures fully online’ is not explicitly tested end-to-end (submission, evidence, payment, decision delivery, and redress), beyond general Art. 6 quality criteria."
      law: "EU Single Digital Gateway Regulation (EU) 2018/1724 — Art. 2(2) (procedures fully online)"
      risk: "Authorities can find SDG non-compliance even if ‘quality’ is high: citizens may still be forced into in-person steps (identity proofing, document submission, signatures, fee payments, appointment booking), creating cross-border barriers and failing the SDG baseline."
      fix:
        code: |
          q('GOV-CS-10', 'Compliance', 'For all SDG-scoped procedures, does the agent ensure the full procedure is available fully online end-to-end (including identification/authentication, guidance, form completion, evidence submission, e-signature where applicable, fee/payment, status tracking, decision delivery, and appeal/redress initiation), with documented exceptions and accessibility-preserving alternative channels, per SDG Regulation (EU) 2018/1724 Article 2(2)?', 'EU SDG 2018/1724 Art. 2(2)', 'Procedure is not fully online: one or more mandatory steps require in-person/phone/mail workarounds or manual staff intervention, with no exception governance or evidence', 'Most steps are online, but identity/evidence/payment/decision delivery or redress steps still require offline actions or are inconsistently available across procedures', 'All SDG procedures are end-to-end fully online with exception governance, evidence of completion rates, cross-border accessibility checks, and auditable proof that offline steps are not mandatory except where legally justified', 15)
        score_impact: 1.1

    - id: GAP-39-C2
      what: "eIDAS 2.0 cross-border functionality is not tested: the pack lists eIDAS 2.0 but has no control verifying cross-border identification/authentication and relying-party acceptance for citizen services (required anchor: eIDAS 2.0 §6 cross-border)."
      law: "eIDAS 2.0 (EU) 2024/1183 — §6 (cross-border use/recognition)"
      risk: "Citizen services may work domestically but fail for cross-border users (mobile EU citizens, frontier workers, students, businesses), undermining SDG objectives, causing interoperability failures, and creating legal/complaint exposure due to unequal access to essential public services."
      fix:
        code: |
          q('GOV-CS-11', 'Interoperability', 'Does the agent support eIDAS 2.0 cross-border use (per §6) by enabling (1) cross-border identification/authentication acceptance, (2) EUDI Wallet or equivalent credential presentation flows where applicable, (3) relying-party verification and attribute validation, (4) multilingual/cross-border error handling and support, and (5) evidence exports demonstrating successful cross-border transactions and interoperability testing?', 'eIDAS 2.0 §6 (cross-border)', 'No cross-border support: identity/credential flows work only for domestic users and fail for cross-border credentials or foreign-issued attributes', 'Some cross-border scenarios work, but coverage is incomplete, usability is poor, and there is limited evidence of interoperability testing and relying-party validation', 'Full cross-border readiness with interoperable identity/credential acceptance, relying-party verification, consistent UX across Member States, and audit-ready evidence of cross-border transactions and conformance testing', 18)
        score_impact: 1.4

    - id: GAP-39-C3
      what: "WCAG 2.1 Success Criterion 2.4.3 (Focus Order) is not explicitly tested for multi-step citizen-service procedures and AI-assisted forms; current accessibility control is WCAG 2.1 AA in general."
      law: "WCAG 2.1 — SC 2.4.3 Focus Order"
      risk: "Complex workflows (authentication, eligibility checks, evidence upload, payment, consent prompts) can be ‘WCAG-ish’ but still fail keyboard/screen-reader navigation in practice; this causes exclusion for users with disabilities and creates enforceable non-compliance under EU accessibility rules and procurement policies."
      fix:
        code: |
          q('GOV-CS-12', 'Accessibility', 'Across all citizen-service user journeys (including AI-assisted decision notices, identity steps, uploads, and payments), does the agent ensure WCAG 2.1 SC 2.4.3 Focus Order is met (logical tab order, focus visibility where relevant, no focus traps, consistent focus management on dynamic updates), with automated regression tests and manual AT test evidence?', 'WCAG 2.1 SC 2.4.3', 'No focus-order control: keyboard navigation order is illogical, dynamic steps trap focus, or assistive technology users cannot complete procedures', 'Some pages meet focus order, but complex journeys (wizards/modals/dynamic forms) have inconsistent focus management and limited test evidence', 'End-to-end focus-order compliance across all journeys with automated checks, AT-supported manual test evidence, and change-control gates preventing regressions', 12)
        score_impact: 0.9

  major:
    - id: GAP-39-M1
      what: "Section 508 is listed, but Section 508 §1194.22 web requirements are not operationalized as explicit, testable controls and evidence outputs."
      law: "Section 508 — 36 CFR Part 1194.22"
      risk: "US-facing deployments (or vendors serving mixed jurisdictions) can fail procurement compliance despite general ‘WCAG AA’ claims; this creates bid/procurement risk and inconsistent accessibility assurance across agencies."
      fix:
        code: |
          q('GOV-CS-13', 'Accessibility', 'For web-based citizen services, does the agent meet Section 508 §1194.22 requirements (including text alternatives, keyboard access, non-interference with assistive tech, form label/field associations, timing control, and accessible documentation), and produce evidence bundles (test reports, exception logs, remediation tracking) suitable for procurement/audit?', 'Section 508 §1194.22', 'No 508 mapping: accessibility is asserted but not evidenced against §1194.22, with gaps in forms/keyboard/AT compatibility', 'Partial mapping: some criteria are met and tested, but gaps remain and evidence is not consistently retained or auditable', 'Full §1194.22 compliance with traceable criteria mapping, repeatable testing, remediation SLAs, and audit-ready evidence bundles', 10)
        score_impact: 0.4

path_to_10:
  - priority: 1
    action: "Add an explicit SDG Art. 2(2) ‘fully online end-to-end’ control (GOV-CS-10) and require evidence that no mandatory offline steps remain for SDG procedures."
    effort: medium
    gap_ids: [GAP-39-C1]
    score_gain: 1.1

  - priority: 2
    action: "Add an eIDAS 2.0 §6 cross-border interoperability control (GOV-CS-11) covering credential acceptance, relying-party validation, and evidence of cross-border successful transactions."
    effort: medium
    gap_ids: [GAP-39-C2]
    score_gain: 1.4

  - priority: 3
    action: "Make WCAG 2.1 SC 2.4.3 Focus Order a clause-specific, regression-tested requirement for all multi-step journeys (GOV-CS-12)."
    effort: low
    gap_ids: [GAP-39-C3]
    score_gain: 0.9

  - priority: 4
    action: "Operationalize Section 508 §1194.22 as an explicit control with evidence bundles (GOV-CS-13) for US/mixed-jurisdiction procurement defensibility."
    effort: low
    gap_ids: [GAP-39-M1]
    score_gain: 0.4

    gap_ids: [GAP-04-M1]
    score_gain: 0.9

  - priority: 4
    action: "Add FAO Code Art. 7.2 fisheries management governance (ENV-SS-13) to cover science-based sustainable use and ecosystem-approach controls for marine resources."
    effort: medium
    gap_ids: [GAP-04-M2]
    score_gain: 0.8

  - priority: 5
    action: "Operationalize EU Biodiversity Strategy 2030 Target 4 (ENV-SS-14) with measurable indicators, baselines, and verifiable reporting to prevent ‘basis listed but untestable’ ambiguity."
    effort: low

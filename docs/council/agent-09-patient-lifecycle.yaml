agent_id: '09'
pack_id: patient-lifecycle
score: 7.2
rationale: |
  Strengths (what’s covered):
  - Strong patient-journey framing (appointment → diagnosis → treatment → prognosis) with riskTier=critical and realistic key risks (misdiagnosis, triage delay, consent gaps, handoff failures, bias).
  - HLT-PL-1/3/4/8 provide meaningful safety/traceability anchors for CDS, triage, care coordination, and medication safety.
  - HLT-PL-11 explicitly references 21 CFR §807.87(l) (PCCP/change control plan) and post-market monitoring concepts for adaptive clinical decision support.
  - EU MDR Annex I is referenced in regulatoryBasis and in question-level citations (e.g., Annex I §23.4), and the pack generally emphasizes audit trails, quality measures, and patient access.

  Key completeness issues (what’s missing / mis-scoped against the requested key regulations):
  - FDA 510(k) submission completeness: the pack cites “FDA 510(k)” and tests PCCP (807.87(l)), but does not test broader 510(k) content requirements in 21 CFR §807.87 (e.g., device description, intended use/indications, labeling, performance testing, software documentation) that drive premarket acceptability.
  - ISO 14971 risk analysis specificity: patient-lifecycle lacks an explicit risk analysis / hazard identification question aligned to ISO 14971:2019 §5.4 (risk analysis: hazards, hazardous situations, sequences of events, foreseeable misuse). ISO 14971 appears in the adjacent clinical-lifecycle pack, but not here—creating a gap for end-to-end patient workflow automation.
  - Joint Commission NPSG.06.01.01 (medication reconciliation) is not covered. HLT-PL-8 covers medication safety checks, but does not test medication reconciliation at transitions of care (admission/transfer/discharge) and patient medication list communication.
  - IEC 62304:2006 §5.2 (software requirements analysis) is not tested in patient-lifecycle. Given this pack includes predictive CDS and automation, software requirements and traceability are a core safety lever.
  - EU MDR 2017/745 Annex I §1 (general safety and performance requirements / risk-benefit / state of the art) is not directly tested; the current MDR references skew toward information/labeling clauses (e.g., §23.4).

gaps:
  critical:
    - id: GAP-09-C1
      what: "FDA 510(k) content requirements are not explicitly tested beyond PCCP; 21 CFR §807.87 core submission elements (device description, intended use, labeling, performance/software documentation) are not assessed, risking ‘regulatory readiness’ claims without evidence completeness."
      law: "21 CFR §807.87 (FDA 510(k) content requirements)"
      risk: "Premarket submission may be refused or substantially delayed due to missing/insufficient 510(k) content (e.g., intended use/labeling alignment, software documentation, performance testing), increasing time-to-market and elevating patient safety risk if controls are undocumented."
      fix:
        code: |
          q('HLT-PL-12', 'Compliance', 'Does the agent support FDA 510(k) submission evidence completeness per 21 CFR §807.87, including intended use/indications alignment, device/software description, labeling controls, and performance testing documentation for patient-facing CDS/triage functions?', '21 CFR §807.87', 'No 510(k) evidence package; intended use/labeling/performance evidence is missing or inconsistent across agent features', 'Maintains partial 510(k) artifacts (device description, some performance evidence, draft labeling), but software documentation and testing traceability are incomplete or not audit-ready', 'Comprehensive 510(k) evidence orchestration with §807.87-aligned checklisting, software documentation (per FDA software guidance), performance/clinical evaluation evidence linkage, labeling change control, and submission-ready exports with gap reports', 15)
        score_impact: 1.1

    - id: GAP-09-C2
      what: "No explicit ISO 14971:2019 §5.4 risk analysis question for patient lifecycle automation (triage/CDS/care coordination), leaving hazard identification, hazardous situations, and sequence-of-events analysis untested."
      law: "ISO 14971:2019 §5.4"
      risk: "Systematic hazards (e.g., triage misclassification sequences, consent failures, handoff drop-offs, bias-induced under-triage) can persist without formal risk analysis, increasing probability of serious patient harm and undermining EU MDR/FDA safety cases."
      fix:
        code: |
          q('HLT-PL-13', 'Safety', 'Does the agent perform and maintain a patient-workflow risk analysis per ISO 14971:2019 §5.4 (identify hazards, hazardous situations, foreseeable misuse, and sequences of events) for triage, CDS recommendations, care transitions, and patient communication?', 'ISO 14971:2019 §5.4', 'No formal risk analysis; hazards and failure sequences are undocumented or ad-hoc', 'Maintains a risk register for major hazards, but sequences of events/foreseeable misuse and linkage to risk controls is incomplete', 'Complete §5.4 risk analysis with sequence-of-events modeling (including data quality, automation bias, handoff failures), foreseeable misuse catalog, linkage to verified risk controls, and continuous updates from post-market signals', 15)
        score_impact: 1.0

  major:
    - id: GAP-09-M1
      what: "Medication reconciliation at transitions of care (Joint Commission NPSG.06.01.01) is not tested; current medication safety coverage focuses on interaction/allergy checks but not reconciliation/communication workflows."
      law: "Joint Commission NPSG.06.01.01"
      risk: "Incomplete or incorrect medication lists during admission/transfer/discharge can cause omissions/duplications/dosing errors, a leading source of preventable adverse drug events—especially when automated workflows accelerate transitions."
      fix:
        code: |
          q('HLT-PL-14', 'Safety', 'Does the agent implement medication reconciliation across transitions of care per Joint Commission NPSG.06.01.01 (obtain/compare medication lists, resolve discrepancies, and communicate the updated list to the next provider and the patient)?', 'Joint Commission NPSG.06.01.01', 'No reconciliation workflow; medication lists are incomplete, inconsistent, or not communicated at transitions', 'Performs basic list aggregation and discrepancy flagging, but reconciliation decisions/communications are manual and inconsistently documented', 'Closed-loop reconciliation with multi-source medication history (pharmacy claims, EHR, patient report), structured discrepancy resolution, documented clinician sign-off, patient-friendly discharge med list delivery, and audit-ready reconciliation evidence', 12)
        score_impact: 0.6

    - id: GAP-09-M2
      what: "IEC 62304:2006 §5.2 software requirements analysis is not covered for patient-lifecycle agents, despite high-risk software functions (triage/CDS) that require requirements definition and traceability."
      law: "IEC 62304:2006 §5.2"
      risk: "Without formal software requirements analysis and traceability, safety-critical behaviors (e.g., alert thresholds, escalation logic, contraindication checks) can be underspecified, inconsistently implemented, and insufficiently tested—raising defect and recall risk."
      fix:
        code: |
          q('HLT-PL-15', 'Traceability', 'Does the agent support software requirements analysis and requirements traceability for safety-related functions per IEC 62304:2006 §5.2 (including linkage to risk controls and verification evidence)?', 'IEC 62304:2006 §5.2', 'No software requirements; behavior is implicit and tests do not trace to safety requirements', 'Maintains partial requirements and some trace links to tests, but risk-control linkage and change impact analysis are incomplete', 'Full §5.2 compliance with safety-class-driven requirements rigor, bidirectional traceability (hazard → requirement → implementation → verification), change impact analysis, and release gating on trace completeness', 12)
        score_impact: 0.7

    - id: GAP-09-M3
      what: "EU MDR 2017/745 Annex I §1 (general safety and performance requirements / risk-benefit / state of the art) is not directly tested; MDR coverage focuses on downstream information/recordkeeping clauses."
      law: "EU MDR 2017/745 Annex I §1"
      risk: "A system may have documentation and audit trails but still fail GSPR fundamentals (acceptable risk-benefit, risk reduction as far as possible, state-of-the-art controls), creating notified body findings and potential market access blocks."
      fix:
        code: |
          q('HLT-PL-16', 'Safety', 'Does the agent demonstrate EU MDR 2017/745 Annex I §1 alignment by documenting risk-benefit, state-of-the-art safety measures, and risk reduction “as far as possible” for patient-lifecycle automation (triage/CDS/coordination)?', 'EU MDR 2017/745 Annex I §1', 'No GSPR evidence; risk-benefit and state-of-the-art rationale are absent for automated clinical functions', 'Documents high-level risk-benefit and some safety measures, but does not maintain state-of-the-art justification or residual risk acceptability rationale', 'Comprehensive GSPR evidence pack with state-of-the-art benchmarked controls, quantified risk-benefit support, residual risk evaluation/acceptability rationale, and continuous update from vigilance and real-world performance data', 10)
        score_impact: 0.5

  minor:
    - id: GAP-09-m1
      what: "Pack uses JCI accreditation framing but does not explicitly bridge to (domestic) Joint Commission National Patient Safety Goals terminology; this can confuse deployers seeking NPSG-specific readiness."
      law: "Joint Commission NPSGs (terminology alignment)"
      risk: "Audit preparation ambiguity and incomplete mapping between internal controls and accreditor expectations; increases implementation friction and the chance of missed accreditation-ready evidence."
      fix:
        code: |
          q('HLT-PL-17', 'Governance', 'Does the agent maintain an accreditor crosswalk mapping JCI standards to Joint Commission NPSG controls (including NPSG.06.01.01) with evidence pointers and responsibility assignments?', 'Joint Commission NPSG crosswalk expectations', 'No crosswalk; teams cannot map implemented controls to NPSGs/JCI requirements', 'Maintains a partial mapping spreadsheet, but it is not kept current with changes and lacks evidence pointers', 'Automated control crosswalk with versioned mappings, evidence pointers (policies/logs/test reports), and change alerts when accreditor standards update', 6)
        score_impact: 0.2


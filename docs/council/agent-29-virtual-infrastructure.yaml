agent_id: '29'
pack_id: virtual-infrastructure
score: 6.4
rationale: |
  Strengths (what’s covered):
  - The pack correctly classifies cloud / virtual infrastructure as critical-risk and frames data sovereignty + resilience as core outcomes (riskTier: critical; explicit cross-border transfer and continuity questions).
  - ISO 27001:2022 is directly operationalized as an Annex A control system with continuous control effectiveness monitoring and an evidence chain (MOB-VI-1), which is directionally aligned with certifiable ISMS expectations.
  - EU NIS2 Art. 21 is explicitly included (MOB-VI-5), and the prompt text correctly calls out incident handling, supply chain security, management accountability, and training—key NIS2 themes.
  - CSA STAR Level 2 / CCM v4.0 is explicitly included (MOB-VI-4) with automated evidence collection language, which is appropriate for STAR-style assurance where evidence quality is often the bottleneck.
  - Data sovereignty is addressed with GDPR Ch. V transfer controls and EU Data Act portability concepts (MOB-VI-3), and the “full” state includes transfer impact assessment automation and real-time residency enforcement.

  Key completeness issues vs requested key regulations (what’s missing / mis-scoped):
  - FedRAMP Rev. 5 is listed in regulatoryBasis, but there is no question that tests FedRAMP’s enforcement-critical access control anchor **AC-2 (Account Management)** (provisioning/deprovisioning, privileged accounts, external accounts, periodic reviews, and evidence).
  - ISO/IEC 27001:2022 is referenced generically as “Annex A controls”, but the requested control **A.5.23 (Information security for use of cloud services)** is not specifically tested. This matters because A.5.23 is the ISO control that most directly checks shared responsibility, cloud service selection, configuration baselines, and cloud contractual/security requirements.
  - EU Data Act is referenced for portability (Art. 23-31 in MOB-VI-3), but the requested **Art. 25 cloud switching** (provider-to-provider switching, exit assistance, functional equivalence, timelines/charges constraints, and exit evidence) is not tested—leaving a major vendor lock-in and “exit readiness” gap.
  - NIS2 Art. 21 is included, but it is implemented as a single high-level question that does not explicitly verify coverage of the **10 Art. 21(2) measure categories** with auditable mappings and evidence readiness; this can mask partial implementations.

  Overall, this pack is strong on breadth and modern cloud assurance framing (ISO 27001 + CSA CCM + NIS2), but it underperforms against audit-grade compliance because it does not yet operationalize a few key control/article anchors that commonly drive real-world findings in government cloud (FedRAMP AC-2), ISO cloud governance (A.5.23), and EU exit/switching compliance (Data Act Art. 25).

gaps:
  critical:
    - id: GAP-29-C1
      what: "FedRAMP Rev. 5 is in scope, but the pack does not explicitly test FedRAMP/NIST 800-53 Rev.5 AC-2 Account Management (full lifecycle account governance and evidence)."
      law: "FedRAMP Rev. 5 — AC-2 (Account Management)"
      risk: "Without AC-2-grade account governance, cloud infrastructure agents may automate provisioning while failing mandatory controls for account approval, privileged account restrictions, external/third-party account governance, timely deprovisioning, and periodic access reviews—creating a high-likelihood path to unauthorized access and FedRAMP assessment failure."
      fix:
        code: |
          q('MOB-VI-10', 'Access Control', 'Does the agent implement FedRAMP Rev. 5 / NIST SP 800-53 Rev.5 AC-2 Account Management, including (1) documented account types and approval workflows, (2) privileged account lifecycle controls, (3) external/third-party account governance, (4) automated deprovisioning/disablement on role change/termination, (5) periodic account/access reviews with reconciliation, and (6) immutable audit evidence for all account events?', 'FedRAMP Rev. 5 AC-2', 'No AC-2 controls: accounts are created/managed ad hoc; privileged/external accounts are not governed; deprovisioning and reviews are inconsistent; audit evidence is missing', 'Partial AC-2: basic provisioning and some reviews exist, but privileged/external account governance, reconciliation, and evidence completeness are inconsistent', 'Full AC-2 implementation with lifecycle automation, privileged/external account governance, periodic reconciliation, exception handling, and FedRAMP-audit-ready evidence bundles for assessors', 15)
        score_impact: 1.1

    - id: GAP-29-C2
      what: "ISO/IEC 27001:2022 is implemented broadly, but the requested Annex A control A.5.23 (information security for use of cloud services) is not specifically operationalized as a control question."
      law: "ISO/IEC 27001:2022 — Annex A A.5.23 (Information security for use of cloud services)"
      risk: "Organizations often pass general ISMS narratives but fail cloud-specific assurance due to unclear shared-responsibility allocation, missing cloud security requirements in contracts, uncontrolled cloud service onboarding, and inconsistent configuration baselines—leading to recurring audit findings and control gaps in multi-cloud environments."
      fix:
        code: |
          q('MOB-VI-11', 'Governance', 'Does the agent implement ISO/IEC 27001:2022 Annex A control A.5.23 by governing the secure use of cloud services, including (1) cloud service selection and onboarding criteria, (2) shared responsibility matrix definition and maintenance, (3) required contractual security clauses and audit rights, (4) configuration baseline/hardening governance, (5) monitoring of cloud service use and drift, and (6) evidence linking cloud controls to the Statement of Applicability?', 'ISO/IEC 27001:2022 A.5.23', 'No cloud-use governance: cloud services are adopted without defined security requirements, shared responsibility, baselines, or evidence mapping', 'Some governance exists (policies/baselines), but shared responsibility, contract controls, and SoA/evidence mapping are incomplete or inconsistent', 'Full A.5.23 implementation with controlled onboarding, shared responsibility governance, contractual control enforcement, baseline/drift monitoring, and auditor-ready evidence mapped to SoA', 12)
        score_impact: 1.0

    - id: GAP-29-C3
      what: "EU Data Act portability is referenced (Art. 23-31), but EU Data Act Art. 25 cloud switching / exit readiness is not tested, leaving vendor lock-in risk unaddressed."
      law: "EU Data Act (Regulation (EU) 2023/2854) — Art. 25 (Switching between data processing services)"
      risk: "Cloud customers may be unable to switch providers or exit within required constraints, leading to contractual/regulatory noncompliance, operational disruption during migrations, and entrenchment of vendor lock-in driven by AI-managed architectural decisions."
      fix:
        code: |
          q('MOB-VI-12', 'Interoperability', 'Does the agent implement EU Data Act Art. 25 cloud switching and exit readiness, including (1) provider-to-provider switching plan and tested runbooks, (2) functional equivalence mapping for critical services, (3) data/application export formats and portability tooling, (4) exit assistance obligations and evidence retention, (5) switching timelines, cost/charge constraints governance, and (6) post-exit data deletion/verification workflows?', 'EU Data Act 2023/2854 Art. 25', 'No switching readiness: no exit plan, no functional equivalence mapping, no tested migration runbooks, and no audit-ready evidence of switching support', 'Partial readiness: some export/migration tooling exists, but equivalence mapping, timelines/cost governance, and evidence are incomplete', 'Full Art. 25 compliance with tested switching runbooks, equivalence mapping, portability tooling, contractual assistance governance, timeline/cost controls, and regulator/auditor-ready evidence', 12)
        score_impact: 0.9

    - id: GAP-29-C4
      what: "NIS2 Art. 21 is represented as a single broad question, but it does not explicitly verify coverage of all 10 Art. 21(2) measure categories with control-to-category mapping and evidence readiness."
      law: "EU NIS2 Directive 2022/2555 — Art. 21(2)(a)-(j) (10 cybersecurity risk-management measure categories)"
      risk: "Teams can claim NIS2 alignment while leaving gaps in specific Art. 21 categories (e.g., secure development, HR/access governance, cryptography, or tested effectiveness), increasing breach likelihood and creating compliance exposure when audited or after an incident."
      fix:
        code: |
          q('MOB-VI-13', 'Governance', 'Does the agent implement NIS2 Art. 21 by maintaining an auditable mapping and evidence for each of the 10 measure categories (a)-(j), including risk analysis/policies, incident handling, business continuity/crisis management, supply chain security, secure acquisition/development/maintenance, effectiveness testing/auditing, cryptography, HR/access/asset governance, MFA/secure communications, and cybersecurity training, with reporting readiness for management accountability?', 'EU NIS2 2022/2555 Art. 21(2)(a)-(j)', 'No category coverage evidence: NIS2 is treated as a generic label without category mapping or audit-ready evidence', 'Some categories are implemented, but mapping/evidence is incomplete and several categories are weak or untested', 'Full Art. 21 implementation with category-by-category controls, evidence packs, effectiveness testing, and management reporting for compliance and incident scrutiny', 12)
        score_impact: 0.6

  major: []
  minor:
    - id: GAP-29-m1
      what: "The pack cites 'EU Data Act 2023' generally; adding the specific regulation number and Article anchors (e.g., 2023/2854 Art. 25) improves audit defensibility and reduces citation drift."
      law: "EU Data Act — citation precision / control mapping governance"
      risk: "Imprecise citations make it harder to demonstrate traceable compliance and can cause 'paper compliance' gaps where evidence does not map cleanly to legal requirements during audits."
      fix:
        code: |
          q('MOB-VI-14', 'Governance', 'Does the program maintain a versioned regulatory mapping for the pack (FedRAMP Rev.5, NIS2 2022/2555, ISO 27001:2022, EU Data Act 2023/2854) with periodic review so legal/control citations and evidence expectations remain audit-defensible over time?', 'Regulatory mapping governance', 'No mapping governance: citations drift and evidence cannot be reliably mapped to specific controls/articles', 'Mapping exists but updates are manual and can lag regulatory changes', 'Versioned regulatory mapping with review workflow and automated checks for citation consistency and evidence linkage across the pack', 6)
        score_impact: 0.1


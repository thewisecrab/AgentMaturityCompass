apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "amc.fullname" . }}-config
  labels:
    {{- include "amc.labels" . | nindent 4 }}
data:
  AMC_WORKSPACE_DIR: {{ .Values.workspace.mountPath | quote }}
  AMC_BIND: {{ .Values.env.AMC_BIND | quote }}
  AMC_STUDIO_PORT: {{ .Values.env.AMC_STUDIO_PORT | quote }}
  AMC_GATEWAY_PORT: {{ .Values.env.AMC_GATEWAY_PORT | quote }}
  AMC_PROXY_PORT: {{ .Values.env.AMC_PROXY_PORT | quote }}
  AMC_TOOLHUB_PORT: {{ .Values.env.AMC_TOOLHUB_PORT | quote }}
  AMC_LAN_MODE: {{ .Values.env.AMC_LAN_MODE | quote }}
  AMC_ALLOWED_CIDRS: {{ .Values.env.AMC_ALLOWED_CIDRS | quote }}
  AMC_QUERY_LEASE_CARRIER_ENABLED: {{ .Values.env.AMC_QUERY_LEASE_CARRIER_ENABLED | quote }}
  AMC_TRUSTED_PROXY_HOPS: {{ .Values.env.AMC_TRUSTED_PROXY_HOPS | quote }}
  AMC_DATA_RETENTION_DAYS: {{ .Values.env.AMC_DATA_RETENTION_DAYS | quote }}
  AMC_ENABLE_NOTARY: {{ .Values.env.AMC_ENABLE_NOTARY | quote }}
  AMC_NOTARY_BASE_URL: {{ .Values.env.AMC_NOTARY_BASE_URL | quote }}
  AMC_NOTARY_REQUIRED_ATTESTATION: {{ .Values.env.AMC_NOTARY_REQUIRED_ATTESTATION | quote }}

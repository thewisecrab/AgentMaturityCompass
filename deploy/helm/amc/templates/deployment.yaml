apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "amc.fullname" . }}
  labels:
    {{- include "amc.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "amc.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "amc.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        {{- include "amc.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "amc.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: amc-studio
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "amc.fullname" . }}-config
          env:
            - name: AMC_BOOTSTRAP
              value: {{ ternary "1" "0" .Values.bootstrap.enabled | quote }}
            - name: AMC_VAULT_PASSPHRASE_FILE
              value: /run/secrets/amc_vault_passphrase
            - name: AMC_BOOTSTRAP_OWNER_USERNAME_FILE
              value: /run/secrets/amc_owner_username
            - name: AMC_BOOTSTRAP_OWNER_PASSWORD_FILE
              value: /run/secrets/amc_owner_password
            - name: AMC_NOTARY_AUTH_SECRET_FILE
              value: /run/secrets/amc_notary_auth_secret
          ports:
            - name: studio
              containerPort: {{ .Values.service.port }}
            - name: gateway
              containerPort: {{ .Values.service.gatewayPort }}
            - name: proxy
              containerPort: {{ .Values.service.proxyPort }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: studio
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: studio
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: workspace
              mountPath: {{ .Values.workspace.mountPath }}
            - name: secrets
              mountPath: /run/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
      {{- if .Values.notary.enabled }}
        - name: amc-notary
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "dist/cli.js", "notary", "start", "--notary-dir", "/data/notary", "--workspace", "{{ .Values.workspace.mountPath }}"]
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: AMC_NOTARY_DIR
              value: /data/notary
            - name: AMC_NOTARY_PASSPHRASE_FILE
              value: /run/secrets/amc_notary_passphrase
            - name: AMC_NOTARY_AUTH_SECRET_FILE
              value: /run/secrets/amc_notary_auth_secret
          ports:
            - name: notary
              containerPort: {{ .Values.notary.port }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: notary
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: notary
            initialDelaySeconds: 10
            periodSeconds: 15
          volumeMounts:
            - name: notary
              mountPath: /data/notary
            - name: workspace
              mountPath: {{ .Values.workspace.mountPath }}
              readOnly: true
            - name: secrets
              mountPath: /run/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
      {{- end }}
      volumes:
        - name: workspace
          {{- if .Values.workspace.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "amc.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: secrets
          secret:
            secretName: {{ .Values.bootstrap.vaultPassphraseSecret.name }}
            items:
              - key: {{ .Values.bootstrap.vaultPassphraseSecret.key }}
                path: amc_vault_passphrase
              - key: {{ .Values.bootstrap.ownerUsernameSecret.key }}
                path: amc_owner_username
              - key: {{ .Values.bootstrap.ownerPasswordSecret.key }}
                path: amc_owner_password
              - key: {{ .Values.notary.passphraseSecret.key }}
                path: amc_notary_passphrase
              - key: {{ .Values.notary.authSecret.key }}
                path: amc_notary_auth_secret
        {{- if .Values.notary.enabled }}
        - name: notary
          {{- if .Values.notary.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "amc.fullname" . }}-notary
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
        - name: tmp
          emptyDir: {}

# AMC Full Stack — Docker Compose
#
# Usage:
#   docker compose up
#   Open http://localhost:3212 for Studio
#
# Services:
#   - studio: AMC Studio dashboard + API (port 3212) + Gateway (port 3210)

services:
  studio:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile
    ports:
      - "3212:3212"
      - "3210:3210"
    volumes:
      - amc_data:/data/amc
    environment:
      - AMC_STUDIO_PORT=3212
      - AMC_GATEWAY_PORT=3210
      - AMC_VAULT_PASSPHRASE_FILE=/run/secrets/vault_passphrase
      - AMC_BOOTSTRAP_OWNER_PASSWORD_FILE=/run/secrets/owner_password
      - NODE_ENV=production
    command: ["node", "dist/cli.js", "up", "--non-interactive"]
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3212/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    secrets:
      - vault_passphrase
      - owner_password

secrets:
  vault_passphrase:
    file: ./secrets/vault_passphrase.txt
  owner_password:
    file: ./secrets/owner_password.txt

volumes:
  amc_data:

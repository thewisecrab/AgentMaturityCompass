apiVersion: apps/v1
kind: Deployment
metadata:
  name: amc-studio
  labels:
    app.kubernetes.io/name: amc
    app.kubernetes.io/component: control-plane
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: amc
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: amc
        app.kubernetes.io/component: control-plane
    spec:
      terminationGracePeriodSeconds: 40
      securityContext:
        fsGroup: 10001
      containers:
        - name: amc-studio
          image: amc-studio:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: amc-config
          env:
            - name: AMC_BOOTSTRAP
              value: "1"
            - name: AMC_VAULT_PASSPHRASE_FILE
              value: /run/secrets/amc_vault_passphrase
            - name: AMC_BOOTSTRAP_OWNER_USERNAME_FILE
              value: /run/secrets/amc_owner_username
            - name: AMC_BOOTSTRAP_OWNER_PASSWORD_FILE
              value: /run/secrets/amc_owner_password
            - name: AMC_NOTARY_AUTH_SECRET_FILE
              value: /run/secrets/amc_notary_auth_secret
          ports:
            - name: studio
              containerPort: 3212
            - name: gateway
              containerPort: 3210
            - name: proxy
              containerPort: 3211
          startupProbe:
            httpGet:
              path: /healthz
              port: studio
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: studio
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: studio
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 6
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: workspace
              mountPath: /data/amc
            - name: secrets
              mountPath: /run/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: amc-workspace
        - name: secrets
          secret:
            secretName: amc-secrets
            items:
              - key: amc_vault_passphrase
                path: amc_vault_passphrase
              - key: amc_owner_username
                path: amc_owner_username
              - key: amc_owner_password
                path: amc_owner_password
              - key: amc_notary_auth_secret
                path: amc_notary_auth_secret
              - key: amc_notary_passphrase
                path: amc_notary_passphrase
        - name: tmp
          emptyDir: {}

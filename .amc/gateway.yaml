listen:
  host: 127.0.0.1
  port: 3210
redaction:
  headerKeysDenylist:
    - authorization
    - x-api-key
    - api-key
    - x-openai-key
  jsonPathsDenylist:
    - $.api_key
    - $.key
  textRegexDenylist:
    - (?i)sk-[A-Za-z0-9]{10,}
    - (?i)bearer\s+[A-Za-z0-9._-]{10,}
upstreams:
  openai:
    baseUrl: ${OPENAI_BASE_URL:-https://api.openai.com}
    auth:
      type: bearer_env
      env: OPENAI_API_KEY
routes:
  - prefix: /openai
    upstream: openai
    stripPrefix: true
